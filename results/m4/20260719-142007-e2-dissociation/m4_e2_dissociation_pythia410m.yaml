# M4-E2 dissociation: execution/verbalization double dissociation on
# singular-plural (EXP-M4-E2-dissociation, D-016 Path A). calibration/fit
# mirror M1 draw 0 so the lens draws (loaded from cache/m4e1/lensdraw{0,1,2},
# fit at E1) verify against the committed M1 manifests. fv section matches
# the M2 cache identity so the certified FVs load unmodified. The report
# measure uses the report-score-prior-corrected@singular-plural instrument
# gated at results/m4/20260719-053911-e2-reportgate (P3). device: cuda.
experiment: pythia410m_m4_e2_dissociation
seed: 0
device: cuda
model:
