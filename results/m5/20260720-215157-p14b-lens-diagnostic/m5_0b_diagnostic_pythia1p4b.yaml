# EXP-M5-0b 1.4B lens diagnostic (DRAFT, uncommitted until the prereg act).
# Probe-only on the 3 already-fitted M5.0 lenses (cache/m5/p14b_draw{0,1,2});
# NO refit (D-027). Fresh matched battery generated by a make_tasks extension
# (countries/facts held out of every gate task). Probe designation: "latent"
# reads the held intermediate (operand/bridge), "output" reads the answer
# token on the SAME prompts. Metric = max-contrast J-lens/logit HMR ratio.
experiment: pythia1p4b_m5_0b_diagnostic
seed: 0
device: mps
model:
  name: EleutherAI/pythia-1.4b
  revision: fedc38a16eea3bd36a96b906d78d11d2ce18ed79
  dtype: float32
lenses:
  reuse_cached: true
  cache_dirs: [cache/m5/p14b_draw0, cache/m5/p14b_draw1, cache/m5/p14b_draw2]
  variant: skip4
battery:
  fresh_latent:  [fresh1hop-operand, fresh2hop-bridge]   # decision-bearing
  fresh_output:  [fresh1hop-answer, fresh2hop-answer]     # matched controls
  posthoc_existing: [capital-operand, capital-recall, multihop-scaled,
                     opposites, word-pairs]               # labelled post-hoc
metric:
  kind: max_contrast          # max_L logit_HMR(L)/HMR_arm(L), HMR_arm(L)<=hmr_cap
  identical_statistic_all_arms: true   # ratified amendment: same S, same argmax,
                                       # per draw, for jlens AND the random arm
  candidate_layers: all       # fixed S = source layers 0..n-2, same for every arm
  jlens_hmr_cap: 5.0
  advantage_ratio: 5.0
  behavioral_include_bar: 0.6
  n_random_seeds: 10
cache_dir: cache/m5/diag_p14b
results_dir: results/m5
