# M5.0 lens draw 2 for Pythia-1.4B (EXP-M5-0 Q-rules; DRAFT, uncommitted
# until the prereg act). Mirrors the M1 draw pattern: seed 2 re-samples the
# calibration prompts; caches/results namespaced per draw. revision null until
# D-023 pins the SHA. band [4,16] is the PROVISIONAL starting band and is
# re-derived from the probing profile at gate time (24 layers, d=2048).
experiment: pythia1p4b_m5_draw2
seed: 2
device: cuda
model:
  name: EleutherAI/pythia-1.4b
  revision: fedc38a16eea3bd36a96b906d78d11d2ce18ed79  # D-023 proposed pin (main @ 2026-07-19), awaiting ruling
  dtype: float32
calibration:
  corpus: NeelNanda/pile-10k
  split: train
  n_prompts: 10
  n_heldout: 3
fit:
  max_seq_len: 128
  dim_batch: 8
  skip_first_variants: [4]  # skip4-only default (measured 640 s/prompt: a {2,4,8} sweep on all draws breaches the 12 h LAW; sweep option priced in EXP-M5-0)
  source_layers: null
  target_layer: null
evals:
  pass_k: 10
  band: [4, 16]
  baseline_threshold: 0.8
  topk_report: 10
  n_random_seeds: 10
  swap_alpha: 1.0
  swap_rcond: 0.05
cache_dir: cache/m5/p14b_draw2
results_dir: results/m5/p14b_draw2
